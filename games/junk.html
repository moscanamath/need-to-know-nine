<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Junk — Need to Know Nine</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh;padding:1rem;}
.wrap{max-width:900px;margin:0 auto;}
h1{font-size:20px;margin-bottom:2px;}
.sub{color:#777;font-size:13px;margin-bottom:1rem;}
.setup{background:#fff;border:1px solid #e0ddd6;border-radius:12px;padding:1rem;margin-bottom:1rem;}
.setup label{font-size:13px;font-weight:600;display:block;margin-bottom:6px;}
select,button{font-size:14px;padding:8px 12px;border-radius:8px;border:1px solid #d0cdc6;background:#fff;}
.btn{background:#2d6a0a;color:#fff;border:none;cursor:pointer;font-weight:700;}
.btn.sec{background:#fff;color:#444;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:8px;}
.board{display:none;}
.board.active{display:block;}
.player-board{background:#fff;border:1px solid #e0ddd6;border-radius:12px;padding:.75rem;margin-bottom:.75rem;}
.player-name{font-weight:700;font-size:14px;margin-bottom:.5rem;display:flex;justify-content:space-between;align-items:center;}
.player-name.turn{color:#2d6a0a;}
.slots{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.slot{aspect-ratio:1;border:2px solid #ccc;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;position:relative;background:#f5f4f0;}
.slot.face-up{background:#e8f5e0;border-color:#5a9e20;color:#2d6a0a;}
.slot.clickable{cursor:pointer;border-color:#1a5fa8;background:#e6f0fb;}
.slot.clickable:active{transform:scale(.95);}
.mistakes{color:#c0392b;}
.slot .pos{position:absolute;top:2px;left:4px;font-size:9px;color:#999;font-weight:400;}
.slot .content{font-size:11px;line-height:1.2;text-align:center;padding:2px;white-space:pre-line;}
.pile-area{display:flex;gap:14px;align-items:center;justify-content:center;margin:1rem 0;}
.deck-card,.junk-card{width:70px;height:96px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;text-align:center;cursor:pointer;border:2px solid #444;background:#1a4a8a;color:#fff;user-select:none;}
.deck-card:active{transform:scale(.96);}
.junk-card{background:#f5f4f0;color:#aaa;cursor:default;}
.current-card{width:90px;height:120px;border-radius:10px;border:2px solid #e8734a;background:#fff8f0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:13px;font-weight:700;text-align:center;padding:6px;white-space:pre-line;}
.log{font-size:12px;color:#666;text-align:center;min-height:20px;margin-top:6px;}
.winner{text-align:center;padding:2rem;font-size:22px;font-weight:700;color:#2d6a0a;}
</style>
</head>
<body>
<div class="wrap">
  <h1>Junk</h1>
  <div class="sub">Draw a card, do the mental math yourself, then click the spot on YOUR board where it belongs. Get it right, keep going. Get it wrong — wrong math or wrong spot — and your turn ends.</div>

  <div class="setup" id="setupArea">
    <div class="row">
      <div>
        <label>Deck</label>
        <select id="deckSelect"></select>
      </div>
      <div>
        <label>Players</label>
        <select id="playerCount" onchange="onModeChange()">
          <option value="1">Just me (vs. Computer)</option>
          <option value="2" selected>2 players (pass the device)</option>
          <option value="3">3 players (pass the device)</option>
          <option value="online">Play someone online (classmate, teacher, parent, or tutor)</option>
        </select>
      </div>
    </div>
    <button class="btn" id="startLocalBtn" onclick="startGame()">Start game</button>

    <div id="onlineSetup" style="display:none;margin-top:10px;padding-top:10px;border-top:1px solid #e0ddd6;">
      <div class="row">
        <input type="text" id="onlineName" placeholder="Your name" style="flex:1;min-width:140px;padding:8px 10px;border-radius:8px;border:1px solid #d0cdc6;">
      </div>
      <div class="row">
        <button class="btn" onclick="createRoom()">Create a room</button>
        <span style="color:#888;font-size:13px;">— or —</span>
        <input type="text" id="joinCodeInput" placeholder="Enter room code" maxlength="5" style="width:120px;text-transform:uppercase;padding:8px 10px;border-radius:8px;border:1px solid #d0cdc6;">
        <button class="btn sec" onclick="joinRoom()">Join</button>
      </div>
      <div id="onlineStatusMsg" style="font-size:13px;color:#666;margin-top:6px;"></div>
    </div>
  </div>

  <div class="board" id="board">
    <div id="playersArea"></div>
    <div class="pile-area">
      <div class="junk-card" id="junkPileDisplay">Junk pile<br>(0)</div>
      <div class="deck-card" id="drawPileDisplay" onclick="drawCard()">Draw pile<br><span id="drawCount"></span> left</div>
      <div class="current-card" id="currentCard" style="display:none;"></div>
    </div>
    <div class="log" id="logLine"></div>
    <div class="row" style="justify-content:center;">
      <button class="btn sec" onclick="onlineRoom ? resetOnline() : resetToSetup()">New game</button>
    </div>
  </div>

  <div class="winner" id="winnerArea" style="display:none;"></div>
</div>

<script>
const DECKS = {
  elementary_sample: {
    title: 'Elementary — Money, Ten Frame, Mental Math, Time',
    categories: [
      {
        name: 'Mental Math (+/−)',
        cards: [
          {display:'8\n−7', value:1}, {display:'5\n−3', value:2}, {display:'1\n+2', value:3},
          {display:'3\n+1', value:4}, {display:'9\n−4', value:5}, {display:'4\n+2', value:6},
          {display:'10\n−3', value:7}, {display:'4\n+4', value:8}, {display:'11\n−2', value:9},
          {display:'7\n+3', value:10}
        ]
      },
      {
        name: 'Ten Frame',
        cards: Array.from({length:10}, (_,i) => ({display:'●'.repeat(i+1)+'\n('+(i+1)+' dots)', value:i+1}))
      },
      {
        name: 'Time (o\'clock)',
        cards: Array.from({length:10}, (_,i) => ({display:(i+1)+':00', value:i+1}))
      },
      {
        name: 'Money (pennies)',
        cards: Array.from({length:10}, (_,i) => ({display:(i+1)+'¢\n('+(i+1)+' pennies)', value:i+1}))
      }
    ]
  }
};

let state = null;

function populateDeckSelect(){
  const sel = document.getElementById('deckSelect');
  sel.innerHTML = Object.entries(DECKS).map(([k,d]) => `<option value="${k}">${d.title}</option>`).join('');
}
populateDeckSelect();

function buildShuffledDeck(deckKey){
  const deck = DECKS[deckKey];
  let cards = [];
  deck.categories.forEach(cat => {
    cat.cards.forEach(c => cards.push({display:c.display, value:c.value, kind:'number', category:cat.name}));
  });
  for(let i=0;i<8;i++) cards.push({display:'JUNK', value:null, kind:'junk'});
  for(let i=0;i<4;i++) cards.push({display:'WILD', value:null, kind:'wild'});
  for(let i=cards.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [cards[i],cards[j]] = [cards[j],cards[i]];
  }
  return cards;
}

function makePlayer(name, isComputer){
  return { name, isComputer, mistakes:0, slots: Array.from({length:10}, () => ({ revealed:false, card:null })) };
}

function startGame(){
  const deckKey = document.getElementById('deckSelect').value;
  const mode = document.getElementById('playerCount').value;
  const drawPile = buildShuffledDeck(deckKey);

  let players;
  if(mode === '1'){
    players = [ makePlayer('You', false), makePlayer('Computer', true) ];
  } else {
    const n = parseInt(mode, 10);
    players = Array.from({length:n}, (_,i) => makePlayer('Player ' + (i+1), false));
  }

  state = {
    deckKey, drawPile, junkPile: [], players, current: 0, currentDrawn: null, gameOver: false
  };

  document.getElementById('setupArea').style.display = 'none';
  document.getElementById('board').classList.add('active');
  document.getElementById('winnerArea').style.display = 'none';
  render();
}

function reshuffleJunkIntoDraw(){
  if(state.junkPile.length === 0) return;
  state.drawPile = state.junkPile;
  state.junkPile = [];
  for(let i=state.drawPile.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [state.drawPile[i],state.drawPile[j]] = [state.drawPile[j],state.drawPile[i]];
  }
  log('Reshuffled the Junk pile back into the draw pile.');
}

function resetToSetup(){
  state = null;
  document.getElementById('setupArea').style.display = 'block';
  document.getElementById('board').classList.remove('active');
  document.getElementById('winnerArea').style.display = 'none';
}

function render(){
  if(!state) return;
  const area = document.getElementById('playersArea');
  area.innerHTML = state.players.map((p, idx) => {
    const isAwaitingAnswer = (idx === state.current) && !!state.currentDrawn && !p.isComputer;
    return `
    <div class="player-board">
      <div class="player-name ${idx===state.current?'turn':''}">${p.name}${idx===state.current?(p.isComputer?' — thinking…':' — your turn'):''}
        <span style="font-size:11px;color:#888;font-weight:400;">${p.slots.filter(s=>s.revealed).length}/10 revealed <span class="mistakes">${p.mistakes?('· '+p.mistakes+' miss'+(p.mistakes>1?'es':'')):''}</span></span>
      </div>
      <div class="slots">
        ${p.slots.map((s,i) => `
          <div class="slot ${s.revealed?'face-up':''} ${isAwaitingAnswer?'clickable':''}" ${isAwaitingAnswer?`onclick="chooseSlot(${idx},${i})"`:''}>
            <div class="pos">${i+1}</div>
            ${s.revealed ? `<div class="content">${s.card.display.replace(/\n/g,'<br>')}</div>` : ''}
          </div>`).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('drawCount').textContent = state.drawPile.length;
  document.getElementById('junkPileDisplay').innerHTML = `Junk pile<br>(${state.junkPile.length})`;

  const cc = document.getElementById('currentCard');
  if(state.currentDrawn){
    cc.style.display='flex';
    cc.innerHTML = state.currentDrawn.display.replace(/\n/g,'<br>');
  } else {
    cc.style.display='none';
  }
}

function log(msg){ document.getElementById('logLine').textContent = msg; }

function drawCard(){
  if(!state || state.gameOver) return;
  const player = state.players[state.current];
  if(player.isComputer) return;
  if(state.currentDrawn) return;
  if(state.drawPile.length === 0) reshuffleJunkIntoDraw();
  if(state.drawPile.length === 0){ log('No cards left anywhere — start a new game.'); return; }

  const card = state.drawPile.pop();

  if(card.kind === 'junk'){
    state.junkPile.push(card);
    log(`Junk! ${player.name}'s turn ends.`);
    render();
    endTurnAndContinue();
    return;
  }

  state.currentDrawn = card;
  log(card.kind === 'wild'
    ? 'Wild! Click any open spot on your board to place it.'
    : 'Work it out, then click the spot on your board where this card belongs.');
  render();
}

function chooseSlot(playerIdx, slotIdx){
  if(!state || state.gameOver) return;
  if(playerIdx !== state.current) return;
  const player = state.players[state.current];
  if(player.isComputer || !state.currentDrawn) return;

  const card = state.currentDrawn;
  const slot = player.slots[slotIdx];

  if(card.kind === 'wild'){
    if(slot.revealed) return;
    slot.revealed = true;
    slot.card = { display: 'WILD', value: null };
    state.currentDrawn = null;
    log(`Wild placed in position ${slotIdx+1} — draw again!`);
    render();
    checkWin(player);
    return;
  }

  if(!slot.revealed && slotIdx === card.value - 1){
    slot.revealed = true;
    slot.card = card;
    state.currentDrawn = null;
    log(`Correct — position ${slotIdx+1} was ${card.value}. Draw again!`);
    render();
    checkWin(player);
    return;
  }

  player.mistakes = (player.mistakes || 0) + 1;
  state.junkPile.push(card);
  state.currentDrawn = null;
  const reason = slot.revealed
    ? `position ${slotIdx+1} was already filled`
    : `the actual value was ${card.value}, not ${slotIdx+1}`;
  log(`Not quite — ${reason}. Turn over.`);
  render();
  endTurnAndContinue();
}

function computerTakeTurn(){
  if(!state || state.gameOver) return;
  const player = state.players[state.current];
  if(!player.isComputer) return;

  setTimeout(() => {
    if(!state || state.gameOver) return;
    if(state.drawPile.length === 0) reshuffleJunkIntoDraw();
    if(state.drawPile.length === 0){ log('No cards left anywhere — start a new game.'); return; }
    const card = state.drawPile.pop();

    if(card.kind === 'junk'){
      state.junkPile.push(card);
      log('Computer drew Junk — turn ends.');
      render();
      endTurnAndContinue();
      return;
    }

    if(card.kind === 'wild'){
      const openIdx = player.slots.findIndex(s => !s.revealed);
      if(openIdx === -1){ state.junkPile.push(card); render(); endTurnAndContinue(); return; }
      player.slots[openIdx].revealed = true;
      player.slots[openIdx].card = { display: 'WILD', value: null };
      log(`Computer played a Wild in position ${openIdx+1}.`);
      render();
      if(checkWin(player)) return;
      computerTakeTurn();
      return;
    }

    const slot = player.slots[card.value - 1];
    if(slot.revealed){
      state.junkPile.push(card);
      log(`Computer drew a repeat (${card.value}) — turn ends.`);
      render();
      endTurnAndContinue();
      return;
    }
    slot.revealed = true;
    slot.card = card;
    log(`Computer revealed position ${card.value}.`);
    render();
    if(checkWin(player)) return;
    computerTakeTurn();
  }, 800);
}

function checkWin(player){
  if(player.slots.every(s => s.revealed)){
    state.gameOver = true;
    document.getElementById('board').classList.remove('active');
    const winnerArea = document.getElementById('winnerArea');
    winnerArea.style.display = 'block';
    winnerArea.innerHTML = `🎉 ${player.name} wins — all 10 flipped! <br><button class="btn sec" style="margin-top:1rem;" onclick="resetToSetup()">New game</button>`;
    return true;
  }
  return false;
}

function endTurnAndContinue(){
  state.currentDrawn = null;
  state.current = (state.current + 1) % state.players.length;
  render();
  const next = state.players[state.current];
  if(next.isComputer) computerTakeTurn();
}

let onlineRoom = null;
let myPlayerIndex = null;
let pollTimer = null;

function onModeChange(){
  const mode = document.getElementById('playerCount').value;
  document.getElementById('onlineSetup').style.display = mode === 'online' ? 'block' : 'none';
  document.getElementById('startLocalBtn').style.display = mode === 'online' ? 'none' : 'block';
}

async function createRoom(){
  const name = document.getElementById('onlineName').value.trim() || 'Player 1';
  const deckKey = document.getElementById('deckSelect').value;
  setOnlineStatus('Creating room…');
  try{
    const resp = await fetch('/.netlify/functions/junkroom', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'create', name, deckDef: DECKS[deckKey] })
    });
    const room = await resp.json();
    if(room.error){ setOnlineStatus('Error: ' + room.error); return; }
    onlineRoom = room; myPlayerIndex = 0;
    setOnlineStatus(`Room code: ${room.code} — share this with whoever you're playing. Waiting for them to join…`);
    enterOnlineBoard();
    startPolling();
  }catch(e){ setOnlineStatus('Network error creating room: ' + e.message); }
}

async function joinRoom(){
  const name = document.getElementById('onlineName').value.trim() || 'Player 2';
  const code = document.getElementById('joinCodeInput').value.trim().toUpperCase();
  if(!code){ setOnlineStatus('Enter a room code first.'); return; }
  setOnlineStatus('Joining room…');
  try{
    const resp = await fetch('/.netlify/functions/junkroom', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'join', code, name })
    });
    const room = await resp.json();
    if(room.error){ setOnlineStatus('Error: ' + room.error); return; }
    onlineRoom = room; myPlayerIndex = room.players.length - 1;
    enterOnlineBoard();
    startPolling();
  }catch(e){ setOnlineStatus('Network error joining room: ' + e.message); }
}

function setOnlineStatus(msg){ document.getElementById('onlineStatusMsg').textContent = msg; }

function enterOnlineBoard(){
  document.getElementById('setupArea').style.display = 'none';
  document.getElementById('board').classList.add('active');
  document.getElementById('winnerArea').style.display = 'none';
  renderOnline();
}

function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if(!onlineRoom || onlineRoom.status === 'done') return;
    try{
      const resp = await fetch('/.netlify/functions/junkroom?code=' + onlineRoom.code);
      if(!resp.ok) return;
      const room = await resp.json();
      if(room.error) return;
      if(room.version !== onlineRoom.version){
        onlineRoom = room;
        renderOnline();
        if(room.status === 'done') clearInterval(pollTimer);
      }
    }catch(e){}
  }, 1500);
}

async function onlineDrawCard(){
  if(!onlineRoom || onlineRoom.status !== 'playing') return;
  if(onlineRoom.turn !== myPlayerIndex) return;
  if(onlineRoom.currentDraw) return;
  try{
    const resp = await fetch('/.netlify/functions/junkroom', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'draw', code: onlineRoom.code, playerIndex: myPlayerIndex })
    });
    const room = await resp.json();
    if(room.error){ setOnlineStatus('Error: ' + room.error); return; }
    onlineRoom = room;
    renderOnline();
  }catch(e){ setOnlineStatus('Network error: ' + e.message); }
}

async function onlineChooseSlot(playerIdx, slotIdx){
  if(!onlineRoom || onlineRoom.turn !== myPlayerIndex) return;
  if(playerIdx !== myPlayerIndex) return;
  if(!onlineRoom.currentDraw) return;
  try{
    const resp = await fetch('/.netlify/functions/junkroom', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'answer', code: onlineRoom.code, playerIndex: myPlayerIndex, slotIndex: slotIdx })
    });
    const room = await resp.json();
    if(room.error){ setOnlineStatus('Error: ' + room.error); return; }
    onlineRoom = room;
    renderOnline();
    if(room.status === 'done') showOnlineWinner();
  }catch(e){ setOnlineStatus('Network error: ' + e.message); }
}

function renderOnline(){
  if(!onlineRoom) return;
  const room = onlineRoom;
  const area = document.getElementById('playersArea');

  if(room.players.length < 2){
    area.innerHTML = `<div class="player-board"><div class="player-name">Waiting for a second player to join with the room code above…</div></div>`;
  } else {
    area.innerHTML = room.players.map((p, idx) => {
      const isMyTurnHere = (idx === room.turn) && idx === myPlayerIndex && !!room.currentDraw;
      return `
      <div class="player-board">
        <div class="player-name ${idx===room.turn?'turn':''}">${p.name}${idx===myPlayerIndex?' (you)':''}${idx===room.turn?' — turn now':''}
          <span style="font-size:11px;color:#888;font-weight:400;">${p.slots.filter(s=>s.revealed).length}/10 revealed <span class="mistakes">${p.mistakes?('· '+p.mistakes+' miss'+(p.mistakes>1?'es':'')):''}</span></span>
        </div>
        <div class="slots">
          ${p.slots.map((s,i) => `
            <div class="slot ${s.revealed?'face-up':''} ${isMyTurnHere?'clickable':''}" ${isMyTurnHere?`onclick="onlineChooseSlot(${idx},${i})"`:''}>
              <div class="pos">${i+1}</div>
              ${s.revealed ? `<div class="content">${s.card.display.replace(/\n/g,'<br>')}</div>` : ''}
            </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }

  document.getElementById('drawCount').textContent = room.deck.length;
  document.getElementById('junkPileDisplay').innerHTML = `Junk pile<br>(${room.junkPile.length})`;
  document.getElementById('drawPileDisplay').onclick = onlineDrawCard;

  const cc = document.getElementById('currentCard');
  if(room.currentDraw){
    cc.style.display='flex';
    cc.innerHTML = room.currentDraw.display.replace(/\n/g,'<br>');
  } else {
    cc.style.display='none';
  }

  if(room.players.length < 2){
    document.getElementById('logLine').textContent = 'Share the room code with whoever you\'re playing to begin.';
  } else if(room.turn === myPlayerIndex){
    document.getElementById('logLine').textContent = room.currentDraw ? 'Your turn — work it out and click your answer.' : 'Your turn — tap the draw pile.';
  } else {
    document.getElementById('logLine').textContent = `Waiting on ${room.players[room.turn].name}…`;
  }

  if(room.status === 'done') showOnlineWinner();
}

function showOnlineWinner(){
  document.getElementById('board').classList.remove('active');
  const winnerArea = document.getElementById('winnerArea');
  winnerArea.style.display = 'block';
  const winnerName = onlineRoom.players[onlineRoom.winnerIdx].name;
  winnerArea.innerHTML = `🎉 ${winnerName} wins — all 10 flipped! <br><button class="btn sec" style="margin-top:1rem;" onclick="resetOnline()">New game</button>`;
  if(pollTimer) clearInterval(pollTimer);
}

function resetOnline(){
  onlineRoom = null; myPlayerIndex = null;
  if(pollTimer) clearInterval(pollTimer);
  document.getElementById('setupArea').style.display = 'block';
  document.getElementById('board').classList.remove('active');
  document.getElementById('winnerArea').style.display = 'none';
  setOnlineStatus('');
}
</script>
</body>
</html>
